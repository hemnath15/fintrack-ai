<mat-card class="ai-card">

    <div class="header">

        <div class="title">

            <mat-icon>psychology</mat-icon>

            <h2>AI Financial Insights</h2>

        </div>

        <span class="badge">
            AI
        </span>

    </div>

    <div class="insight">

        <mat-icon color="primary">
            trending_up
        </mat-icon>

        <div>

            <h3>Revenue Increased</h3>

            <p>
                Revenue has increased by
                <strong>12%</strong>
                compared to last month.
            </p>

        </div>

    </div>

    <div class="insight">

        <mat-icon color="warn">
            warning
        </mat-icon>

        <div>

            <h3>Expense Alert</h3>

            <p>
                Travel expenses are higher than expected.
            </p>

        </div>

    </div>

    <div class="recommendation">

        <h3>Recommendation</h3>

        <p>

            Reduce travel spending by around
            <strong>8%</strong>

            to improve your monthly profit margin.

        </p>

    </div>

    <button mat-flat-button color="primary">

        Generate New Insights

    </button>

</mat-card>
