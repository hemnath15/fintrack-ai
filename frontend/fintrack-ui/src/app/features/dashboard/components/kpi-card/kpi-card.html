<mat-card class="kpi-card">

  <div class="card-header">

    <mat-icon>{{ icon() }}</mat-icon>

    <span
      class="trend"
      [class.positive]="positive()"
      [class.negative]="!positive()">

      {{ trend() }}

    </span>

  </div>

  <h2>{{ value() }}</h2>

  <p>{{ title() }}</p>

</mat-card>
